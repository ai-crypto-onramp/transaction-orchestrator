services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: to
      POSTGRES_USER: u
      POSTGRES_PASSWORD: p
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "u", "-d", "to"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2-alpine
    command: ["-js"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Stub partner services: tiny gRPC servers are provided by the test
  # harness; for local dev set POLICY_URL=stub:// etc. to use in-process stubs.
  orchestrator:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    environment:
      DB_URL: "postgres://u:p@postgres:5432/to?sslmode=disable"
      REDIS_URL: "redis:6379"
      EVENT_BUS_URL: "nats://nats:4222"
      POLICY_URL: "stub://"
      PAYMENT_URL: "stub://"
      KYT_URL: "stub://"
      MPC_URL: "stub://"
      BLOCKCHAIN_URL: "stub://"
      LEDGER_URL: "stub://"
      LOG_LEVEL: "info"
    ports:
      - "8080:8080"