syntax = "proto3";

package kyt.v1;

option go_package = "github.com/ai-crypto-onramp/transaction-orchestrator/internal/pb/kyt;pb";

// AmlKytScreening screens the destination address / transaction for AML/KYT
// risk.
service AmlKytScreening {
  rpc Screen(KytRequest) returns (KytResponse);
}

message KytRequest {
  string tx_id        = 1;
  string user_id      = 2;
  string dest_address = 3;
  string amount       = 4;
  string asset        = 5;
}

message KytResponse {
  string decision = 1; // "clear" | "review" | "reject"
  string reason   = 2;
}